<div
    id="assistant-widget"
    class="fixed bottom-5 right-5 z-50 max-h-[88vh] overflow-y-auto pr-1"
    data-assistant-user="{{ request.user.display_name|default:'Guest' }}"
    data-authenticated="{% if request.user.is_authenticated %}true{% else %}false{% endif %}"
>
    <div id="assistant-panel" class="pointer-events-auto hidden w-[min(92vw,24rem)] max-h-[min(82vh,46rem)] overflow-y-auto rounded-[2rem] border border-white/70 bg-white/90 shadow-[0_30px_80px_rgba(15,23,42,0.22)] backdrop-blur">
        <div class="sticky top-0 z-10 bg-gradient-to-r from-slate-900 via-sky-800 to-rose-500 px-5 py-4 text-white">
            <div class="flex items-start justify-between gap-4">
                <div>
                    <p class="text-xs uppercase tracking-[0.24em] text-white/70">Live help</p>
                    <h2 class="mt-1 flex items-center gap-2 text-lg font-bold"><i class="bi bi-stars text-amber-200"></i>FundiConnect AI</h2>
                    <p class="mt-1 text-sm text-white/80">Jobs, bids, inbox, and account help.</p>
                </div>
                <button type="button" id="assistant-close" class="inline-flex items-center gap-2 rounded-xl bg-white/10 px-3 py-2 text-sm font-semibold text-white transition hover:bg-white/20"><i class="bi bi-x-lg"></i>Close</button>
            </div>
        </div>
        <div class="flex min-h-0 max-h-[calc(min(82vh,46rem)-5.5rem)] flex-col">
        <div id="assistant-messages" class="min-h-[10rem] flex-1 space-y-3 overflow-y-auto bg-gradient-to-b from-white via-slate-50 to-sky-50/60 px-4 py-4"></div>
        <div class="border-t border-slate-200 bg-white/90 px-4 py-4">
            <div id="assistant-typing" class="mb-2 hidden text-xs font-medium text-sky-700">FundiConnect AI Assistant is typing...</div>
            <div id="assistant-user-typing" class="mb-2 hidden text-xs font-medium text-slate-500">You are typing...</div>
            <div id="assistant-status" class="mb-2 hidden text-xs font-medium text-slate-500"></div>
            <form id="assistant-form" class="space-y-3">
                <textarea id="assistant-input" rows="3" class="w-full rounded-[1.4rem] border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-800 outline-none transition focus:border-sky-400 focus:bg-white" placeholder="Ask for help with posting, bidding, delivery, or messaging..."></textarea>
                <div class="flex items-center justify-between gap-3">
                    <p class="text-xs text-slate-500">Live assistant channel.</p>
                    <button type="submit" class="inline-flex items-center gap-2 rounded-[1.2rem] bg-slate-900 px-4 py-3 text-sm font-semibold text-white transition hover:-translate-y-0.5 hover:bg-slate-700" data-loading-label="Sending..."><i class="bi bi-send-fill"></i>Send</button>
                </div>
            </form>
        </div>
        </div>
    </div>
    <button type="button" id="assistant-toggle" class="assistant-glow pointer-events-auto mt-3 flex items-center gap-3 rounded-full bg-gradient-to-r from-slate-900 via-sky-700 to-rose-500 px-5 py-4 text-sm font-semibold text-white shadow-[0_20px_60px_rgba(15,23,42,0.25)] transition duration-300 hover:-translate-y-1">
        <span class="inline-flex h-3 w-3 rounded-full bg-emerald-300 shadow-[0_0_0_6px_rgba(134,239,172,0.2)]"></span>
        <i class="bi bi-robot"></i>
        <span>Ask FundiConnect AI</span>
    </button>
</div>
