<div class="ai-suggestion-card rounded-2xl border border-slate-200 bg-white p-4 shadow-soft animate-float-soft">
  <div class="flex items-start justify-between gap-3">
    <div class="min-w-0">
      <div class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">AI suggestion</div>
      <div class="mt-2 text-sm text-slate-800" data-ai-text>{{ text }}</div>
      {% if meta %}
        <div class="mt-2 text-xs text-slate-500">{{ meta }}</div>
      {% endif %}
    </div>
    <div class="flex flex-col items-end gap-2">
      <button type="button" class="apply-ai-btn rounded-full bg-emerald-50 px-3 py-1 text-xs font-semibold text-emerald-700">Use</button>
      <button type="button" class="dismiss-ai-btn text-slate-400 hover:text-slate-700">×</button>
    </div>
  </div>
</div>
