{% load static %}
{% for review in reviews %}
    <div class="rounded-2xl bg-white p-4 shadow-sm">
        <div class="flex items-start justify-between gap-3">
            <div>
                <div class="font-semibold text-slate-900">{{ review.author.display_name }}</div>
                <div class="text-xs text-slate-500">{{ review.created_at|date:"M d, Y" }}</div>
            </div>
            <div class="inline-flex items-center gap-2 text-amber-500 font-semibold"><i class="bi bi-star-fill"></i>{{ review.rating }}/5</div>
        </div>
        <p class="mt-2 text-sm text-slate-600">{{ review.comment|default:'No comment provided.' }}</p>
    </div>
{% empty %}
    <div class="rounded-2xl border border-dashed border-slate-300 bg-slate-50 p-6 text-center text-sm text-slate-500">
        <div class="font-semibold text-slate-900">No reviews yet</div>
        <div class="mt-2">This artisan has not received any client reviews yet.</div>
    </div>
{% endfor %}
