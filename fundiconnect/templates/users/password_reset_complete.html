{% extends 'auth_base.html' %}
{% block title %}Password Reset Complete | FundiConnect{% endblock %}
{% block auth_content %}
<div>
    <div class="inline-flex rounded-full bg-slate-100 px-4 py-2 text-xs font-semibold uppercase tracking-[0.24em] text-slate-600">Password help</div>
    <h1 class="mt-6 text-4xl font-extrabold tracking-tight text-slate-900">Password updated</h1>
    <p class="mt-3 text-sm leading-6 text-slate-500">Your password has been changed successfully. You can now sign in with the new password.</p>
    <a href="{% url 'users:login' %}" class="mt-8 inline-flex items-center gap-2 rounded-full bg-slate-900 px-5 py-3 text-sm font-semibold text-white hover:bg-slate-700"><i class="bi bi-box-arrow-in-right"></i>Go to login</a>
</div>
{% endblock %}
